---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
      - ansible_os_family == "RedHat"
      - ansible_distribution_major_version in ["9", "10"]
      - ansible_service_mgr == "systemd"
      - nexus_architecture in ["x86_64", "aarch_64"]
    fail_msg: >-
      This role supports systemd-based Enterprise Linux 9/10 hosts on x86_64 or
      AArch64. Detected {{ ansible_distribution }} {{ ansible_distribution_version }},
      service manager {{ ansible_service_mgr }}, architecture {{ ansible_architecture }}.

- name: Install Nexus prerequisites
  ansible.builtin.dnf:
    name: "{{ nexus_packages }}"
    state: present
  become: "{{ nexus_become }}"
  when: nexus_manage_packages | bool

- name: Install Java package
  ansible.builtin.dnf:
    name: "{{ nexus_java_package }}"
    state: present
  become: "{{ nexus_become }}"
  when: nexus_manage_java | bool

- name: Create Nexus group
  ansible.builtin.group:
    name: "{{ nexus_group }}"
    system: true
    state: present
  become: "{{ nexus_become }}"

- name: Create Nexus user
  ansible.builtin.user:
    name: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    shell: "{{ nexus_user_shell }}"
    home: "{{ nexus_data_dir }}"
    create_home: false
    system: true
    state: present
  become: "{{ nexus_become }}"

- name: Create Nexus directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(nexus_user) }}"
    group: "{{ item.group | default(nexus_group) }}"
    mode: "{{ item.mode }}"
  become: "{{ nexus_become }}"
  loop:
    - path: "{{ nexus_install_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ nexus_data_dir }}"
      mode: "0750"
    - path: "{{ nexus_data_dir }}/etc"
      mode: "0750"
    - path: "{{ nexus_data_dir }}/log"
      mode: "0750"
    - path: "{{ nexus_tmp_dir }}"
      mode: "0750"

- name: Download Nexus Repository
  ansible.builtin.get_url:
    url: "{{ nexus_download_url }}"
    dest: "{{ nexus_download_dir }}/{{ nexus_package }}"
    checksum: "{{ nexus_download_checksum | default(omit, true) }}"
    owner: root
    group: root
    mode: "0644"
    validate_certs: "{{ nexus_validate_certs }}"
  become: "{{ nexus_become }}"

- name: Extract Nexus Repository
  ansible.builtin.unarchive:
    src: "{{ nexus_download_dir }}/{{ nexus_package }}"
    dest: "{{ nexus_install_dir }}"
    remote_src: true
    creates: "{{ nexus_install_dir }}/{{ nexus_edition }}-{{ nexus_version }}"
    owner: root
    group: root
  become: "{{ nexus_become }}"

- name: Set Nexus installation directory ownership
  ansible.builtin.file:
    path: "{{ nexus_install_dir }}/{{ nexus_edition }}-{{ nexus_version }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: "{{ nexus_become }}"

- name: Link current Nexus installation
  ansible.builtin.file:
    src: "{{ nexus_install_dir }}/{{ nexus_edition }}-{{ nexus_version }}"
    dest: "{{ nexus_current_path }}"
    state: link
    owner: root
    group: root
    force: true
  become: "{{ nexus_become }}"
  notify:
    - Restart nexus

- name: Configure Nexus default properties
  ansible.builtin.template:
    src: nexus-default.properties.j2
    dest: "{{ nexus_current_path }}/etc/nexus-default.properties"
    owner: root
    group: root
    mode: "0644"
  become: "{{ nexus_become }}"
  notify:
    - Restart nexus

- name: Configure Nexus JVM options
  ansible.builtin.template:
    src: nexus.vmoptions.j2
    dest: "{{ nexus_current_path }}/bin/nexus.vmoptions"
    owner: root
    group: root
    mode: "0644"
  become: "{{ nexus_become }}"
  notify:
    - Restart nexus

- name: Install Nexus systemd unit
  ansible.builtin.template:
    src: nexus.service.j2
    dest: "/etc/systemd/system/{{ nexus_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  become: "{{ nexus_become }}"
  notify:
    - Reload systemd
    - Restart nexus

- name: Start and enable Nexus
  ansible.builtin.systemd:
    name: "{{ nexus_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  become: "{{ nexus_become }}"

- name: Wait for Nexus HTTP endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}{{ nexus_context_path }}"
    status_code:
      - 200
      - 302
      - 401
    validate_certs: false
  register: nexus_http_check
  changed_when: false
  until: nexus_http_check.status in [200, 302, 401]
  retries: "{{ (nexus_wait_timeout / 10) | int }}"
  delay: 10
  when: nexus_wait_for_start | bool
