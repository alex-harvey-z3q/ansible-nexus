---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: nexus-el9
    image: geerlingguy/docker-rockylinux9-ansible:latest
    command: /usr/lib/systemd/systemd
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    pre_build_image: true
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
  env:
    ANSIBLE_ROLES_PATH: ..
  inventory:
    group_vars:
      all:
        nexus_become: false
        nexus_wait_for_start: false
verifier:
  name: ansible
